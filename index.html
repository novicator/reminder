<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f0f0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Reminders">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Reminders</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100dvh;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: 80px 20px 36px;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    h1 {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: #555;
      margin-bottom: 36px;
    }

    .form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 36px;
    }

    textarea {
      width: 100%;
      background: #1c1c1c;
      border: 1.5px solid #2a2a2a;
      border-radius: 16px;
      color: #fff;
      font-size: 16px;
      font-family: inherit;
      padding: 14px 16px;
      resize: none;
      height: 74px;
      outline: none;
      transition: border-color 0.15s;
      line-height: 1.4;
    }

    textarea:focus { border-color: #7c3aed; }
    textarea::placeholder { color: #444; }

    .time-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #1c1c1c;
      border: 1.5px solid #2a2a2a;
      border-radius: 16px;
      padding: 12px 16px;
      transition: border-color 0.15s;
    }

    .time-row:focus-within { border-color: #7c3aed; }

    .time-row label {
      font-size: 13px;
      color: #666;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      flex-shrink: 0;
    }

    input[type="datetime-local"] {
      background: none;
      border: none;
      color: #fff;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      flex: 1;
      min-width: 0;
      color-scheme: dark;
    }

    .add-btn {
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 16px;
      padding: 15px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .add-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .add-btn:not(:disabled):active { opacity: 0.85; transform: scale(0.98); }

    .banner {
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
      line-height: 1.4;
    }

    .banner.visible { display: block; }
    .banner.warn { background: #1c1500; border: 1.5px solid #f59e0b; color: #f59e0b; }
    .banner.ok   { background: #001c0a; border: 1.5px solid #22c55e; color: #22c55e; }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 10px;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .item {
      background: #1c1c1c;
      border: 1.5px solid #2a2a2a;
      border-radius: 16px;
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      animation: enter 0.18s ease;
    }

    .item.active { border-color: #3d2d6e; }

    @keyframes enter {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    .item-body { flex: 1; min-width: 0; }

    .item-text {
      font-size: 16px;
      line-height: 1.4;
      color: #fff;
      word-break: break-word;
    }

    .item-meta {
      font-size: 12px;
      color: #555;
      margin-top: 4px;
    }

    .item-meta.is-active { color: #7c3aed; }

    .x-btn {
      background: none;
      border: none;
      color: #3a3a3a;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 3px 5px;
      border-radius: 6px;
      flex-shrink: 0;
      margin-top: 1px;
      transition: color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .x-btn:hover, .x-btn:active {
      color: #ef4444;
      background: rgba(239, 68, 68, 0.12);
    }

    .empty {
      text-align: center;
      color: #2a2a2a;
      padding: 52px 0;
      user-select: none;
    }

    .empty-icon { font-size: 52px; margin-bottom: 10px; }
    .empty-text { font-size: 15px; }

    .install-hint {
      margin-top: auto;
      padding-top: 28px;
      font-size: 12px;
      color: #2a2a2a;
      text-align: center;
      line-height: 1.6;
    }
  </style>
</head>
<body>
<div class="app">
  <h1>Reminders</h1>
  <p class="subtitle">Set a time — fires on your lock screen when it's due</p>

  <div class="banner" id="banner"></div>

  <div class="form">
    <textarea id="input" placeholder="e.g. eat food by 3pm" maxlength="200"></textarea>
    <div class="time-row">
      <label for="timeInput">When</label>
      <input type="datetime-local" id="timeInput">
    </div>
    <button class="add-btn" id="addBtn">Schedule Reminder</button>
  </div>

  <div class="section-label" id="sectionLabel" hidden>Reminders</div>
  <div class="list" id="list"></div>

  <p class="install-hint" id="installHint" hidden>
    Add to Home Screen for reliable background delivery.
  </p>
</div>

<script>
// ── Replace this with your actual VAPID public key ──
const VAPID_PUBLIC_KEY = 'zsVATkabJWxtSd-HnH75r1IwIr4aO2fBvZYFnJPytTU';

const STORE = 'reminders-v1';

function load() {
  try { return JSON.parse(localStorage.getItem(STORE) || '[]'); }
  catch { return []; }
}

function save(items) {
  localStorage.setItem(STORE, JSON.stringify(items));
}

function toLocalDT(date) {
  const d = new Date(date);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function formatWhen(ts) {
  const d = new Date(ts);
  const now = new Date();
  const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  const targetStart = new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
  const time = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  if (targetStart === todayStart) return `today at ${time}`;
  if (targetStart === todayStart + 86400000) return `tomorrow at ${time}`;
  return d.toLocaleDateString([], { weekday: 'long', month: 'short', day: 'numeric' }) + ` at ${time}`;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render(items) {
  const list = document.getElementById('list');
  const label = document.getElementById('sectionLabel');

  if (!items.length) {
    label.hidden = true;
    list.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🔔</div>
        <div class="empty-text">No reminders</div>
      </div>`;
    return;
  }

  const sorted = [...items].sort((a, b) => a.scheduledTime - b.scheduledTime);
  label.hidden = false;

  list.innerHTML = sorted.map(r => {
    const isActive = r.status === 'active';
    return `
      <div class="item ${isActive ? 'active' : ''}">
        <div class="item-body">
          <div class="item-text">${esc(r.text)}</div>
          <div class="item-meta ${isActive ? 'is-active' : ''}">
            ${isActive ? '🔔 On your lock screen' : '⏰ ' + formatWhen(r.scheduledTime)}
          </div>
        </div>
        <button class="x-btn" data-id="${r.id}" title="${isActive ? 'Dismiss' : 'Cancel'}">✕</button>
      </div>`;
  }).join('');
}

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = atob(base64);
  return new Uint8Array([...rawData].map(c => c.charCodeAt(0)));
}

async function subscribeToPush() {
  const reg = await navigator.serviceWorker.ready;
  let sub = await reg.pushManager.getSubscription();
  if (!sub) {
    sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
    });
  }
  return sub;
}

async function dismiss(id) {
  const items = load();
  const reminder = items.find(r => r.id === id);
  if (!reminder) return;

  if (reminder.status === 'pending' && reminder.messageId) {
    fetch('/api/cancel', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messageId: reminder.messageId }),
    }).catch(() => {});
  } else if (reminder.status === 'active') {
    try {
      const reg = await navigator.serviceWorker.ready;
      const notes = await reg.getNotifications({ tag: id });
      notes.forEach(n => n.close());
    } catch {}
  }

  const updated = items.filter(r => r.id !== id);
  save(updated);
  render(updated);
}

function showBanner(msg, type = 'warn') {
  const el = document.getElementById('banner');
  el.textContent = msg;
  el.className = `banner visible ${type}`;
}

function hideBanner() {
  document.getElementById('banner').classList.remove('visible');
}

async function addReminder() {
  const input = document.getElementById('input');
  const timeInput = document.getElementById('timeInput');
  const btn = document.getElementById('addBtn');
  const text = input.value.trim();

  if (!text) { input.focus(); return; }

  const scheduledTime = timeInput.value ? new Date(timeInput.value).getTime() : NaN;
  if (isNaN(scheduledTime)) {
    showBanner('Pick a date and time for this reminder.');
    return;
  }
  if (scheduledTime <= Date.now()) {
    showBanner('Pick a time in the future.');
    return;
  }

  if (!('serviceWorker' in navigator) || !('Notification' in window)) {
    showBanner('Notifications are not supported in this browser.');
    return;
  }

  let perm = Notification.permission;
  if (perm === 'default') perm = await Notification.requestPermission();
  if (perm !== 'granted') {
    showBanner('Notifications are blocked. Enable them in your browser settings.');
    return;
  }

  hideBanner();
  btn.disabled = true;
  btn.textContent = 'Scheduling…';

  try {
    const subscription = await subscribeToPush();
    const id = Date.now().toString();

    const response = await fetch('/api/schedule', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, text, scheduledTime, subscription }),
    });

    if (!response.ok) throw new Error('Server error');

    const { messageId } = await response.json();
    const reminder = { id, text, scheduledTime, createdAt: Date.now(), status: 'pending', messageId };

    const items = [...load(), reminder];
    save(items);
    render(items);

    input.value = '';
    showBanner(`Reminder set for ${formatWhen(scheduledTime)}`, 'ok');
  } catch (err) {
    showBanner('Failed to schedule. Check your connection and try again.');
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Schedule Reminder';
  }
}

async function syncState() {
  if (!('serviceWorker' in navigator)) { render(load()); return; }
  try {
    const reg = await navigator.serviceWorker.ready;
    const activeNotes = await reg.getNotifications();
    const activeTags = new Set(activeNotes.map(n => n.tag));

    let items = load();
    items = items.map(r =>
      r.status === 'pending' && activeTags.has(r.id) ? { ...r, status: 'active' } : r
    );
    items = items.filter(r => r.status !== 'active' || activeTags.has(r.id));

    save(items);
    render(items);
  } catch {
    render(load());
  }
}

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js')
    .then(() => syncState())
    .catch(() => render(load()));

  navigator.serviceWorker.addEventListener('message', (e) => {
    if (e.data?.type === 'FIRED') {
      const items = load().map(r => r.id === e.data.id ? { ...r, status: 'active' } : r);
      save(items);
      render(items);
    }
    if (e.data?.type === 'DISMISSED') {
      const items = load().filter(r => r.id !== e.data.id);
      save(items);
      render(items);
    }
  });
} else {
  render(load());
}

// Set datetime input defaults
const timeInput = document.getElementById('timeInput');
timeInput.min = toLocalDT(Date.now());
const defaultTime = new Date();
defaultTime.setHours(defaultTime.getHours() + 1);
defaultTime.setMinutes(Math.ceil(defaultTime.getMinutes() / 15) * 15, 0, 0);
timeInput.value = toLocalDT(defaultTime);

if (!window.matchMedia('(display-mode: standalone)').matches && !navigator.standalone) {
  document.getElementById('installHint').hidden = false;
}

document.getElementById('addBtn').addEventListener('click', addReminder);

document.getElementById('input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addReminder(); }
});

document.getElementById('list').addEventListener('click', (e) => {
  const btn = e.target.closest('.x-btn');
  if (btn) dismiss(btn.dataset.id);
});

document.addEventListener('visibilitychange', () => {
  if (!document.hidden) syncState();
});
</script>
</body>
</html>
